

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transformer Block · Anatomy of a Decoder Layer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --bg: #07020a;
        --bg2: #0d0310;
        --cyan: #ff3d8a;
        --cyan2: #ff6fae;
        --amber: #ff8c42;
        --violet: #b14aff;
        --rose: #ff5252;
        --lime: #5eff9e;
        --text: #f5d9e8;
        --muted: #6b4a5e;
    }
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    html,
    body {
        background: var(--bg);
        overflow: hidden;
        font-family: 'JetBrains Mono', 'Courier New', monospace;
        height: 100vh;
        width: 100vw;
        cursor: default;
    }
    canvas {
        inset: 0;
        width: 100%;
        height: 100%;
    }
    #hint {
        position: fixed;
        bottom: 1.15rem;
        left: 50%;
        transform: translateX(-50%);
        font-family: 'JetBrains Mono', monospace;
        font-size: 0.62rem;
        font-weight: 500;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        color: rgba(255, 111, 174, 0.6);
        pointer-events: none;
        z-index: 10;
        text-align: center;
    }
    @media (prefers-reduced-motion: no-preference) {
        #hint {
            animation: hintPulse 3.4s ease-in-out infinite;
        }
    }
    @keyframes hintPulse {
        0%,
        100% {
            opacity: 0.4;
        }
        50% {
            opacity: 1;
        }
    }
    #hint::after {
        content: '';
        display: block;
        width: 28px;
        height: 1px;
        margin: 0.5rem auto 0;
        background: linear-gradient(90deg, transparent, rgba(255, 111, 174, 0.7), transparent);
    }
</style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="hint">Hover any stage to inspect</div>
    <script>
        (() => {
            const canvas = document.getElementById('c');
            const ctx = canvas.getContext('2d');
            const PAL = {
                cyan: '#ff3d8a',
                cyan2: '#ff6fae',
                amber: '#ff8c42',
                violet: '#b14aff',
                rose: '#ff5252',
                lime: '#5eff9e',
                bg: '#07020a',
                bg2: '#0d0310',
                panel: '#0c0310',
                text: '#f5d9e8',
                muted: '#6b4a5e',
                dimmer: '#2a1024',
            };

            function rgba(hex, a) {
                const r = parseInt(hex.slice(1, 3), 16),
                    g = parseInt(hex.slice(3, 5), 16),
                    b = parseInt(hex.slice(5, 7), 16);
                return `rgba(${r},${g},${b},${a})`;
            }

            const reducedMotion = !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)')
                .matches);
            const ambientScale = reducedMotion ? 0.18 : 1;

            const LW = 960,
                LH = 1400;
            const CX = LW / 2;
            const BOX = { w: 190, h: 44 };
            const SMALL = { w: 100, h: 38 };
            const ATT_W = 310,
                ATT_H = 240;
            const FFN_W = 260,
                FFN_H = 170;

            const comps = {
                embed: { x: CX - BOX.w / 2, y: 110, w: BOX.w, h: BOX.h, c: PAL.cyan, label: 'TOKEN EMBEDDING',
                    type: 'io' },
                pos: { x: CX - SMALL.w / 2, y: 190, w: SMALL.w, h: SMALL.h, c: PAL.cyan2, label: '+ POSITION',
                    type: 'add' },
                ln1: { x: CX - SMALL.w / 2, y: 264, w: SMALL.w, h: SMALL.h, c: PAL.violet, label: 'LAYER NORM',
                    type: 'norm' },
                attn: { x: CX - ATT_W / 2, y: 338, w: ATT_W, h: ATT_H, c: PAL.amber, label: 'MULTI-HEAD\nATTENTION',
                    type: 'attention' },
                add1: { x: CX - 22, y: 610, w: 44, h: 44, c: PAL.rose, label: '⊕', type: 'add' },
                ln2: { x: CX - SMALL.w / 2, y: 688, w: SMALL.w, h: SMALL.h, c: PAL.violet, label: 'LAYER NORM',
                    type: 'norm' },
                ffn: { x: CX - FFN_W / 2, y: 760, w: FFN_W, h: FFN_H, c: PAL.lime, label: 'FEED FORWARD',
                type: 'ffn' },
                add2: { x: CX - 22, y: 960, w: 44, h: 44, c: PAL.rose, label: '⊕', type: 'add' },
                output: { x: CX - BOX.w / 2, y: 1038, w: BOX.w, h: BOX.h, c: PAL.cyan,
                    label: 'OUTPUT\nPROJECTION', type: 'io' },
            };

            const seq = ['embed', 'pos', 'ln1', 'attn', 'add1', 'ln2', 'ffn', 'add2', 'output'];
            const stepIndex = {};
            seq.forEach((k, i) => stepIndex[k] = i + 1);

            const INFO = {
                embed: {
                    tag: 'INPUT',
                    formula: 'h = E[token_id]',
                    facts: [
                        'A lookup table sized vocab_size × d_model',
                        'Typical scale: 50K–200K vocab, 512–12,288 dims',
                        'Weights are often tied to the output projection',
                    ],
                },
                pos: {
                    tag: 'ENCODE',
                    formula: 'PE(p,2i) = sin(p / 10000^(2i/d))',
                    facts: [
                        'Injects token order into the embedding',
                        'Newer LLMs often use rotary (RoPE) instead',
                        'Without it, attention sees an unordered set',
                    ],
                },
                ln1: {
                    tag: 'NORMALIZE',
                    formula: 'y = γ·(x − μ)/√(σ² + ε) + β',
                    facts: [
                        'Rescales each token vector independently',
                        'Pre-norm placement stabilizes deep stacks',
                        'γ and β are learned per-channel parameters',
                    ],
                },
                attn: {
                    tag: 'MIX TOKENS',
                    formula: 'softmax(QKᵀ / √d_k) · V',
                    facts: [
                        'Every token builds a Query, scores all Keys',
                        'A causal mask hides future tokens from each row',
                        '8–96 heads run in parallel, then concatenate',
                    ],
                },
                add1: {
                    tag: 'RESIDUAL',
                    formula: 'x_out = x_in + Sublayer(x_in)',
                    facts: [
                        'Skip connection preserves the original signal',
                        'Keeps gradients flowing through deep networks',
                        'The residual stream is the model\u2019s shared memory',
                    ],
                },
                ln2: {
                    tag: 'NORMALIZE',
                    formula: 'y = γ·(x − μ)/√(σ² + ε) + β',
                    facts: [
                        'Same operation as the first layer norm',
                        'Re-centers the stream before the MLP reads it',
                        'Cheap relative to attention or the feed-forward pass',
                    ],
                },
                ffn: {
                    tag: 'TRANSFORM',
                    formula: 'GELU(xW₁ + b₁)W₂ + b₂',
                    facts: [
                        'Applied identically to every token position',
                        'Hidden layer is roughly 4× wider than d_model',
                        'Thought to store much of the model\u2019s learned facts',
                    ],
                },
                add2: {
                    tag: 'RESIDUAL',
                    formula: 'x_out = x_in + Sublayer(x_in)',
                    facts: [
                        'Second skip connection, same role as the first',
                        'Lets the MLP contribute an update, not a replacement',
                        'Stream now carries attention + MLP contributions',
                    ],
                },
                output: {
                    tag: 'DECODE',
                    formula: 'logits = h · Wᵀ_embed',
                    facts: [
                        'Projects the final hidden state to vocab scores',
                        'Softmax + temperature / top-p picks the next token',
                        'Repeats autoregressively, one token at a time',
                    ],
                },
            };

            const res1 = { sx: CX - 140, sy: comps.ln1.y + comps.ln1.h / 2, ex: CX + 30, ey: comps.add1.y + comps
                    .add1.h / 2 };
            const res2 = { sx: CX - 140, sy: comps.ln2.y + comps.ln2.h / 2, ex: CX + 30, ey: comps.add2.y + comps
                    .add2.h / 2 };

            const mainFlows = [],
                resFlows1 = [],
                resFlows2 = [];
            for (let i = 0; i < 45; i++) mainFlows.push({ seg: 0, t: Math.random(), speed: (0.0015 + Math.random() *
                    0.005) * ambientScale, col: PAL.cyan, sz: 1.5 + Math.random() * 2.5, ph: Math.random() * 6.28 });
            for (let i = 0; i < 18; i++) resFlows1.push({ t: Math.random(), speed: (0.0018 + Math.random() * 0.004) *
                    ambientScale, sz: 1.2 + Math.random() * 2, ph: Math.random() * 6.28 });
            for (let i = 0; i < 18; i++) resFlows2.push({ t: Math.random(), speed: (0.0018 + Math.random() * 0.004) *
                    ambientScale, sz: 1.2 + Math.random() * 2, ph: Math.random() * 6.28 });
            const bgParts = Array.from({ length: 30 }, () => ({
                x: Math.random() * LW,
                y: Math.random() * LH,
                r: 0.4 + Math.random() * 1.6,
                sp: (0.04 + Math.random() * 0.3) * ambientScale,
                dr: (Math.random() - 0.5) * 0.25 * ambientScale,
                col: [PAL.cyan, PAL.amber, PAL.violet, PAL.lime][Math.floor(Math.random() * 4)],
                ph: Math.random() * 7
            }));

            let view = { focusX: LW / 2, focusY: LH / 2, scale: 1 };
            const ANIM_DURATION = 0.75;
            let animProgress = 1;
            let animStartView = { focusX: LW / 2, focusY: LH / 2, scale: 1 };
            let animTargetView = { focusX: LW / 2, focusY: LH / 2, scale: 1 };
            let hoveredComp = null;
            let baseScale = 1;
            let W, H, dpr;

            function easeInOutCubic(t) {
                return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
            }

            function updateViewTarget() {
                animStartView = { focusX: view.focusX, focusY: view.focusY, scale: view.scale };
                if (hoveredComp) {
                    const comp = comps[hoveredComp];
                    animTargetView = { focusX: comp.x + comp.w / 2, focusY: comp.y + comp.h / 2, scale: baseScale *
                            1.5 };
                } else {
                    animTargetView = { focusX: LW / 2, focusY: LH / 2, scale: baseScale };
                }
                animProgress = 0;
            }

            function drawBox(x, y, w, h, c, fa = 0.08, sa = 0.35, sw = 1.2, hover = false, time = 0) {
                ctx.save();
                if (hover) { ctx.shadowColor = c;
                    ctx.shadowBlur = 16; }
                const grad = ctx.createLinearGradient(x, y, x, y + h);
                grad.addColorStop(0, rgba(PAL.bg2, Math.min(1, fa * 1.7)));
                grad.addColorStop(1, rgba(PAL.bg2, fa * 0.6));
                ctx.fillStyle = grad;
                ctx.strokeStyle = rgba(c, hover ? Math.min(1, sa * 2.5) : sa);
                ctx.lineWidth = sw;
                ctx.beginPath();
                ctx.roundRect(x, y, w, h, 6);
                ctx.fill();
                ctx.stroke();
                ctx.strokeStyle = rgba('#ffffff', hover ? 0.12 : 0.05);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(x + 7, y + 1.1);
                ctx.lineTo(x + w - 7, y + 1.1);
                ctx.stroke();
                ctx.restore();
                if (hover) {
                    const pulse = 4 + 2.4 * Math.sin(time * 4);
                    ctx.save();
                    ctx.strokeStyle = rgba(c, 0.16 + 0.08 * Math.sin(time * 4));
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.roundRect(x - pulse, y - pulse, w + pulse * 2, h + pulse * 2, 8 + pulse);
                    ctx.stroke();
                    ctx.restore();
                }
            }

            function drawLabel(x, y, w, h, text, c) {
                const lines = text.split('\n');
                ctx.fillStyle = rgba(c, 0.92);
                ctx.font = "600 9.5px 'JetBrains Mono', monospace";
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                const lh = 13,
                    sy = y + h / 2 - ((lines.length - 1) * lh) / 2;
                lines.forEach((l, i) => ctx.fillText(l, x + w / 2, sy + i * lh));
            }

            function drawStepBadge(comp, key, hover, time) {
                const n = stepIndex[key];
                if (!n) return;
                const bx = comp.x - 2,
                    by = comp.y - 2;
                ctx.save();
                ctx.textBaseline = 'middle';
                ctx.beginPath();
                ctx.arc(bx, by, 9, 0, 2 * Math.PI);
                ctx.fillStyle = rgba(PAL.bg2, 0.92);
                ctx.fill();
                ctx.strokeStyle = rgba(comp.c, hover ? 0.95 : 0.5);
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.fillStyle = rgba(comp.c, hover ? 1 : 0.8);
                ctx.font = "700 8px 'JetBrains Mono', monospace";
                ctx.textAlign = 'center';
                ctx.fillText(String(n).padStart(2, '0'), bx, by + 0.5);
                ctx.restore();
            }

            function arrow(x1, y1, x2, y2, c = PAL.cyan, ap = 0.35) {
                ctx.save();
                ctx.shadowColor = c;
                ctx.shadowBlur = 3;
                ctx.strokeStyle = rgba(c, ap);
                ctx.lineWidth = 1.2;
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                const ang = Math.atan2(y2 - y1, x2 - x1);
                ctx.fillStyle = rgba(c, ap + 0.15);
                ctx.beginPath();
                ctx.moveTo(x2, y2);
                ctx.lineTo(x2 - 7 * Math.cos(ang - 0.55), y2 - 7 * Math.sin(ang - 0.55));
                ctx.lineTo(x2 - 7 * Math.cos(ang + 0.55), y2 - 7 * Math.sin(ang + 0.55));
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }

            function wrapText(text, maxWidth, font) {
                ctx.font = font;
                const words = text.split(' ');
                const lines = [];
                let line = '';
                words.forEach(word => {
                    const test = line ? line + ' ' + word : word;
                    if (ctx.measureText(test).width > maxWidth && line) {
                        lines.push(line);
                        line = word;
                    } else {
                        line = test;
                    }
                });
                if (line) lines.push(line);
                return lines;
            }

            function drawAttention(comp, t) {
                const { x, y, w, h } = comp;
                const qkvY = y + 30,
                    qkvW = 60,
                    qkvH = 30,
                    gap = 18;
                const qx = x + 40,
                    kx = x + 40 + qkvW + gap,
                    vx = x + 40 + 2 * (qkvW + gap);
                [qx, kx, vx].forEach((cx, i) => {
                    drawBox(cx, qkvY, qkvW, qkvH, PAL.cyan, 0.1, 0.45);
                    ctx.fillStyle = rgba(PAL.cyan, 0.85);
                    ctx.font = "700 11px 'JetBrains Mono'";
                    ctx.textAlign = 'center';
                    ctx.fillText(['Q', 'K', 'V'][i], cx + qkvW / 2, qkvY + qkvH / 2);
                });
                const matY = qkvY + qkvH + 20,
                    matSize = 90,
                    cells = 8,
                    cell = matSize / cells;
                const mx = x + (w - matSize) / 2;
                ctx.fillStyle = rgba(PAL.dimmer, 0.7);
                ctx.fillRect(mx, matY, matSize, matSize);
                for (let i = 0; i < cells; i++) {
                    let rowSum = 0;
                    const row = [];
                    for (let j = 0; j < cells; j++) {
                        const raw = j <= i ? Math.exp(-Math.abs(i - j) / (1.2 + 0.4 * Math.sin(t + i * 0.4))) : 0;
                        row.push(raw);
                        rowSum += raw;
                    }
                    for (let j = 0; j < cells; j++) {
                        const v = row[j] / (rowSum || 1);
                        ctx.fillStyle = j > i ? rgba(PAL.dimmer, 0.4) : rgba(PAL.amber, Math.min(v * 3, 1) * 0.9);
                        ctx.fillRect(mx + j * cell + 0.5, matY + i * cell + 0.5, cell - 1, cell - 1);
                    }
                }
                ctx.strokeStyle = rgba(PAL.amber, 0.5);
                ctx.lineWidth = 1;
                ctx.strokeRect(mx, matY, matSize, matSize);
                ctx.fillStyle = rgba(PAL.amber, 0.6);
                ctx.font = "600 8px 'JetBrains Mono'";
                ctx.textAlign = 'center';
                ctx.fillText('SOFTMAX(QKᵀ/√dₖ)', mx + matSize / 2, matY - 6);
                const outY = matY + matSize + 18;
                drawBox(x + 40, outY, w - 80, 30, PAL.lime, 0.08, 0.4);
                ctx.fillStyle = rgba(PAL.lime, 0.8);
                ctx.font = "600 9px 'JetBrains Mono'";
                ctx.fillText('WEIGHTED SUM (ATTENTION OUTPUT)', x + w / 2, outY + 15);
                ctx.fillStyle = rgba(PAL.amber, 0.5);
                ctx.font = "500 7px 'JetBrains Mono'";
                ctx.fillText('8 HEADS PARALLEL', x + w / 2, outY + 40);
            }

            function drawFFN(comp, t) {
                const { x, y, w, h } = comp;
                const midX = x + w / 2,
                    colL = x + 30,
                    colR = x + w - 30;
                const topY = y + 35,
                    botY = y + h - 35;
                const inCount = 8,
                    hidCount = 28,
                    outCount = 8;
                const inAct = Array.from({ length: inCount }, (_, i) => Math.max(0, Math.sin(t * 1.5 + i * 0.7) * 0.7 +
                    0.45));
                const hidAct = Array.from({ length: hidCount }, (_, i) => Math.max(0, Math.sin(t * 2.2 + i * 0.35) * 0.85 +
                    0.35));
                const outAct = Array.from({ length: outCount }, (_, i) => Math.max(0, Math.cos(t * 1.1 + i * 0.6) * 0.65 +
                    0.5));
                ctx.lineWidth = 0.4;
                for (let i = 0; i < inCount; i++) {
                    const iy = topY + (i + 0.5) * (botY - topY) / inCount;
                    for (let h2 = 0; h2 < hidCount; h2 += 2) {
                        const hy = topY + (h2 + 0.5) * (botY - topY) / hidCount;
                        const a = inAct[i] * hidAct[h2] * 0.22;
                        if (a < 0.02) continue;
                        ctx.strokeStyle = rgba(PAL.cyan, a);
                        ctx.beginPath();
                        ctx.moveTo(colL, iy);
                        ctx.lineTo(midX, hy);
                        ctx.stroke();
                    }
                }
                for (let h2 = 0; h2 < hidCount; h2 += 2) {
                    const hy = topY + (h2 + 0.5) * (botY - topY) / hidCount;
                    for (let o = 0; o < outCount; o++) {
                        const oy = topY + (o + 0.5) * (botY - topY) / outCount;
                        const a = hidAct[h2] * outAct[o] * 0.22;
                        if (a < 0.02) continue;
                        ctx.strokeStyle = rgba(PAL.lime, a);
                        ctx.beginPath();
                        ctx.moveTo(midX, hy);
                        ctx.lineTo(colR, oy);
                        ctx.stroke();
                    }
                }

                function neurons(cx, count, acts, col, rmax) {
                    for (let i = 0; i < count; i++) {
                        const cy = topY + (i + 0.5) * (botY - topY) / count;
                        const a = acts[i] || 0;
                        const r = rmax * (0.25 + a * 0.75);
                        ctx.beginPath();
                        ctx.arc(cx, cy, r, 0, 2 * Math.PI);
                        ctx.fillStyle = rgba(col, 0.35 + a * 0.6);
                        ctx.fill();
                        if (a > 0.65) { ctx.shadowColor = col;
                            ctx.shadowBlur = 8;
                            ctx.fill();
                            ctx.shadowBlur = 0; }
                    }
                }
                neurons(colL, inCount, inAct, PAL.cyan, 4.5);
                neurons(midX, hidCount, hidAct, PAL.amber, 2.5);
                neurons(colR, outCount, outAct, PAL.lime, 4.5);
                ctx.fillStyle = rgba(PAL.cyan, 0.6);
                ctx.font = "600 7px 'JetBrains Mono'";
                ctx.textAlign = 'center';
                ctx.fillText('d_model', colL, topY - 10);
                ctx.fillText('4× GELU', midX, topY - 10);
                ctx.fillText('d_model', colR, topY - 10);
            }

            function drawAnnotations(t) {
                const cycle = t % 20;
                const fade = (start, dur) => {
                    const p = Math.max(0, Math.min(1, (cycle - start) / dur));
                    return (p < 0.1 ? p * 10 : p > 0.9 ? (1 - p) * 10 : 1);
                };
                ctx.textBaseline = 'middle';
                ctx.font = "500 8.5px 'JetBrains Mono', monospace";
                const anns = [
                    { y: comps.embed.y + 20, txt: 'Lookup token vector', c: PAL.cyan, t0: 0.5 },
                    { y: comps.pos.y + 15, txt: 'Add sinusoidal position', c: PAL.cyan2, t0: 2 },
                    { y: comps.ln1.y + 15, txt: 'Normalize across features', c: PAL.violet, t0: 3.5 },
                    { y: comps.attn.y + 40, txt: 'Q/K/V linear projections', c: PAL.cyan, t0: 5 },
                    { y: comps.attn.y + 120, txt: 'Scaled dot-product + softmax', c: PAL.amber, t0: 6.5 },
                    { y: comps.attn.y + 190, txt: 'Weighted sum over values', c: PAL.lime, t0: 8 },
                    { y: comps.add1.y, txt: 'Residual add (skip connection)', c: PAL.rose, t0: 9.5 },
                    { y: comps.ffn.y + 50, txt: 'Expand to 4× hidden dim', c: PAL.cyan, t0: 11 },
                    { y: comps.ffn.y + 110, txt: 'GELU nonlinearity', c: PAL.amber, t0: 12.5 },
                    { y: comps.add2.y, txt: 'Residual add', c: PAL.rose, t0: 14 },
                    { y: comps.output.y + 15, txt: 'Project to vocabulary', c: PAL.cyan, t0: 15.5 },
                ];
                anns.forEach(a => {
                    const alpha = fade(a.t0, 1.8) * 0.85;
                    if (alpha < 0.02) return;
                    ctx.fillStyle = rgba(a.c, alpha);
                    ctx.textAlign = 'right';
                    ctx.fillText(a.txt, comps.attn.x - 25, a.y);
                });
            }

            function drawMiniVisual(key, x, y, w, h, time) {
                const innerX = x,
                    innerY = y,
                    innerW = w,
                    innerH = h;
                switch (key) {
                    case 'embed': {
                        const points = [
                            { x: 0.2, y: 0.3, label: 'king' }, { x: 0.25, y: 0.25, label: 'queen' },
                            { x: 0.15, y: 0.42, label: 'prince' },
                            { x: 0.72, y: 0.68, label: 'cat' }, { x: 0.8, y: 0.6, label: 'dog' },
                            { x: 0.5, y: 0.18, label: 'run' }, { x: 0.58, y: 0.12, label: 'jump' },
                        ];
                        points.forEach(p => {
                            const px = innerX + p.x * innerW + Math.sin(time * 2 + p.x * 10) * 2;
                            const py = innerY + p.y * innerH + Math.cos(time * 1.5 + p.y * 8) * 2;
                            ctx.fillStyle = rgba(PAL.cyan, 0.85);
                            ctx.shadowColor = PAL.cyan;
                            ctx.shadowBlur = 4;
                            ctx.beginPath();
                            ctx.arc(px, py, 2.6, 0, 2 * Math.PI);
                            ctx.fill();
                            ctx.shadowBlur = 0;
                            ctx.fillStyle = rgba(PAL.text, 0.65);
                            ctx.font = "7px 'JetBrains Mono'";
                            ctx.textAlign = 'left';
                            ctx.fillText(p.label, px + 5, py + 3);
                        });
                        break;
                    }
                    case 'pos': {
                        for (let i = 0; i < 4; i++) {
                            const freq = 1 + i * 0.8;
                            const col = [PAL.cyan, PAL.amber, PAL.violet, PAL.lime][i];
                            ctx.beginPath();
                            for (let xx = 0; xx < innerW; xx += 2) {
                                const tPos = (xx / innerW) * Math.PI * 2 * freq + time * 3;
                                const yy = innerY + innerH / 2 + Math.sin(tPos) * innerH * 0.36;
                                if (xx === 0) ctx.moveTo(innerX + xx, yy);
                                else ctx.lineTo(innerX + xx, yy);
                            }
                            ctx.strokeStyle = rgba(col, 0.8);
                            ctx.lineWidth = 1.2;
                            ctx.stroke();
                        }
                        break;
                    }
                    case 'ln1':
                    case 'ln2': {
                        const bars = 8;
                        for (let i = 0; i < bars; i++) {
                            const val = 0.3 + 0.4 * Math.sin(time * 3 + i);
                            const bh = val * innerH * 0.78;
                            ctx.fillStyle = rgba(PAL.violet, 0.7);
                            ctx.fillRect(innerX + i * (innerW / bars) + 2, innerY + innerH - bh, innerW / bars - 4,
                                bh);
                        }
                        ctx.strokeStyle = rgba(PAL.cyan, 0.5);
                        ctx.lineWidth = 1;
                        ctx.beginPath();
                        ctx.moveTo(innerX, innerY + innerH / 2);
                        ctx.lineTo(innerX + innerW, innerY + innerH / 2);
                        ctx.stroke();
                        break;
                    }
                    case 'attn': {
                        const gridSize = 50,
                            cells = 3;
                        const gx = innerX + (innerW - gridSize) / 2,
                            gy = innerY + 14;
                        for (let i = 0; i < cells; i++) {
                            for (let j = 0; j < cells; j++) {
                                const val = j <= i ? Math.exp(-Math.abs(i - j) / 1.5) : 0;
                                ctx.fillStyle = j > i ? rgba(PAL.dimmer, 0.5) : rgba(PAL.amber, val * 0.9);
                                ctx.fillRect(gx + j * (gridSize / cells), gy + i * (gridSize / cells), gridSize /
                                    cells - 1, gridSize / cells - 1);
                            }
                        }
                        ctx.strokeStyle = rgba(PAL.amber, 0.7);
                        ctx.strokeRect(gx, gy, gridSize, gridSize);
                        arrow(innerX + 6, gy + gridSize / 2, gx, gy + gridSize / 2, PAL.cyan, 0.6);
                        arrow(gx + gridSize, gy + gridSize / 2, innerX + innerW - 6, gy + gridSize / 2, PAL.lime,
                        0.6);
                        ctx.fillStyle = rgba(PAL.amber, 0.8);
                        ctx.font = "7px 'JetBrains Mono'";
                        ctx.textAlign = 'center';
                        ctx.fillText('SOFTMAX', gx + gridSize / 2, gy + gridSize + 13);
                        break;
                    }
                    case 'add1':
                    case 'add2': {
                        const vecX = innerX + 16,
                            vecY = innerY + innerH / 2;
                        ctx.fillStyle = rgba(PAL.cyan, 0.85);
                        ctx.beginPath();
                        ctx.arc(vecX, vecY - 14, 3.6, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.fillStyle = rgba(PAL.amber, 0.85);
                        ctx.beginPath();
                        ctx.arc(vecX, vecY + 14, 3.6, 0, 2 * Math.PI);
                        ctx.fill();
                        arrow(vecX, vecY - 14, vecX + innerW - 36, vecY - 14, PAL.cyan, 0.6);
                        arrow(vecX, vecY + 14, vecX + innerW - 36, vecY + 14, PAL.amber, 0.6);
                        arrow(vecX + innerW - 36, vecY - 14, vecX + innerW - 36, vecY + 9, PAL.rose, 0.7);
                        ctx.fillStyle = rgba(PAL.rose, 0.9);
                        ctx.shadowColor = PAL.rose;
                        ctx.shadowBlur = 6;
                        ctx.beginPath();
                        ctx.arc(vecX + innerW - 36, vecY + 9, 4.5, 0, 2 * Math.PI);
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = rgba(PAL.text, 0.6);
                        ctx.font = "7px 'JetBrains Mono'";
                        ctx.textAlign = 'left';
                        ctx.fillText('input', vecX + 6, vecY - 14 + 3);
                        ctx.fillText('sublayer(x)', vecX + 6, vecY + 14 + 3);
                        break;
                    }
                    case 'ffn': {
                        const midX = innerX + innerW / 2;
                        for (let i = 0; i < 5; i++) {
                            const iy = innerY + 16 + i * (innerH - 32) / 4;
                            ctx.fillStyle = rgba(PAL.cyan, 0.7);
                            ctx.beginPath();
                            ctx.arc(innerX + 8, iy, 2.6, 0, 2 * Math.PI);
                            ctx.fill();
                            ctx.fillStyle = rgba(PAL.lime, 0.7);
                            ctx.beginPath();
                            ctx.arc(innerX + innerW - 8, iy, 2.6, 0, 2 * Math.PI);
                            ctx.fill();
                            for (let h2 = 0; h2 < 8; h2++) {
                                const hy = innerY + 16 + h2 * (innerH - 32) / 7;
                                ctx.strokeStyle = rgba(PAL.amber, 0.15);
                                ctx.lineWidth = 0.5;
                                ctx.beginPath();
                                ctx.moveTo(innerX + 8, iy);
                                ctx.lineTo(midX, hy);
                                ctx.stroke();
                                ctx.beginPath();
                                ctx.moveTo(midX, hy);
                                ctx.lineTo(innerX + innerW - 8, iy);
                                ctx.stroke();
                            }
                        }
                        ctx.fillStyle = rgba(PAL.amber, 0.85);
                        ctx.font = "7px 'JetBrains Mono'";
                        ctx.textAlign = 'center';
                        ctx.fillText('4× GELU', midX, innerY + innerH - 4);
                        break;
                    }
                    case 'output': {
                        const vocab = 6;
                        const probs = Array.from({ length: vocab }, (_, i) => Math.exp(-(i - 2) * (i - 2) * 0.4));
                        const maxProb = Math.max(...probs);
                        for (let i = 0; i < vocab; i++) {
                            const barH = (probs[i] / maxProb) * innerH * 0.68;
                            ctx.fillStyle = i === 2 ? PAL.amber : PAL.cyan;
                            if (i === 2) { ctx.shadowColor = PAL.amber;
                                ctx.shadowBlur = 6; }
                            ctx.fillRect(innerX + i * (innerW / vocab) + 2, innerY + innerH - barH - 4, innerW /
                                vocab - 4, barH);
                            ctx.shadowBlur = 0;
                        }
                        ctx.fillStyle = rgba(PAL.amber, 0.9);
                        ctx.font = "7px 'JetBrains Mono'";
                        ctx.textAlign = 'center';
                        ctx.fillText('NEXT-TOKEN DISTRIBUTION', innerX + innerW / 2, innerY + 8);
                        break;
                    }
                }
            }

            function drawPopup(comp, key, time) {
                const info = INFO[key];
                const popupW = 248;
                const factFont = "500 8.3px 'JetBrains Mono', monospace";
                const factMaxW = popupW - 44;
                let factLineTotal = 0;
                const factWraps = info.facts.map(f => {
                    const lines = wrapText(f, factMaxW, factFont);
                    factLineTotal += lines.length;
                    return lines;
                });
                const PAD_TOP = 14,
                    TAG_H = 13,
                    TITLE_H = 13,
                    DIV_GAP = 9;
                const VISUAL_H = 72,
                    GAP1 = 9,
                    FORMULA_H = 25,
                    GAP2 = 11;
                const FACT_LINE_H = 11,
                    FACT_GAP = 7,
                    PAD_BOTTOM = 13;
                const factsH = info.facts.length * FACT_GAP + factLineTotal * FACT_LINE_H;
                const popupH = PAD_TOP + TAG_H + TITLE_H + DIV_GAP + VISUAL_H + GAP1 + FORMULA_H + GAP2 + factsH +
                    PAD_BOTTOM;

                let anchorX = comp.x + comp.w + 22;
                let flipped = false;
                if (anchorX + popupW > LW - 8) { anchorX = comp.x - popupW - 22;
                    flipped = true; }
                let anchorY = comp.y + comp.h / 2 - popupH / 2;
                if (anchorY < 96) anchorY = 96;
                if (anchorY + popupH > LH - 10) anchorY = LH - 10 - popupH;

                ctx.save();
                ctx.strokeStyle = rgba(comp.c, 0.4);
                ctx.lineWidth = 1;
                ctx.setLineDash([2, 3]);
                ctx.beginPath();
                ctx.moveTo(flipped ? comp.x : comp.x + comp.w, comp.y + comp.h / 2);
                ctx.lineTo(flipped ? anchorX + popupW : anchorX, comp.y + comp.h / 2);
                ctx.stroke();
                ctx.setLineDash([]);
                ctx.restore();

                ctx.save();
                ctx.shadowColor = rgba(comp.c, 0.45);
                ctx.shadowBlur = 24;
                ctx.fillStyle = rgba(PAL.panel, 0.97);
                ctx.beginPath();
                ctx.roundRect(anchorX, anchorY, popupW, popupH, 10);
                ctx.fill();
                ctx.restore();

                ctx.save();
                ctx.strokeStyle = rgba(comp.c, 0.55);
                ctx.lineWidth = 1.3;
                ctx.beginPath();
                ctx.roundRect(anchorX, anchorY, popupW, popupH, 10);
                ctx.stroke();
                ctx.strokeStyle = rgba('#ffffff', 0.07);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(anchorX + 8, anchorY + 1.2);
                ctx.lineTo(anchorX + popupW - 8, anchorY + 1.2);
                ctx.stroke();
                ctx.restore();

                ctx.save();
                ctx.textBaseline = 'alphabetic';
                let cy = anchorY + PAD_TOP;

                ctx.textAlign = 'left';
                ctx.fillStyle = rgba(comp.c, 0.9);
                ctx.font = "700 7.5px 'JetBrains Mono', monospace";
                ctx.fillText('STEP ' + String(stepIndex[key]).padStart(2, '0') + '  ·  ' + info.tag, anchorX + 14, cy);
                cy += TAG_H;

                ctx.fillStyle = rgba(PAL.text, 0.96);
                ctx.font = "700 11.5px 'JetBrains Mono', monospace";
                ctx.fillText(comp.label.replace('\n', ' '), anchorX + 14, cy);
                cy += TITLE_H;

                ctx.strokeStyle = rgba(comp.c, 0.28);
                ctx.lineWidth = 1;
                ctx.beginPath();
                ctx.moveTo(anchorX + 14, cy);
                ctx.lineTo(anchorX + popupW - 14, cy);
                ctx.stroke();
                cy += DIV_GAP;

                const visY = cy;
                ctx.save();
                ctx.beginPath();
                ctx.rect(anchorX + 10, visY, popupW - 20, VISUAL_H);
                ctx.clip();
                drawMiniVisual(key, anchorX + 10, visY, popupW - 20, VISUAL_H, time);
                ctx.restore();
                cy = visY + VISUAL_H + GAP1;

                ctx.fillStyle = rgba(PAL.dimmer, 0.6);
                ctx.beginPath();
                ctx.roundRect(anchorX + 12, cy, popupW - 24, FORMULA_H, 5);
                ctx.fill();
                ctx.strokeStyle = rgba(comp.c, 0.22);
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.fillStyle = rgba(PAL.cyan2, 0.95);
                ctx.font = "600 8.6px 'JetBrains Mono', monospace";
                ctx.textAlign = 'center';
                ctx.fillText(info.formula, anchorX + popupW / 2, cy + FORMULA_H / 2 + 3);
                cy += FORMULA_H + GAP2;

                ctx.textAlign = 'left';
                factWraps.forEach(lines => {
                    ctx.fillStyle = rgba(comp.c, 0.85);
                    ctx.beginPath();
                    ctx.arc(anchorX + 17, cy - 3, 1.6, 0, 2 * Math.PI);
                    ctx.fill();
                    ctx.fillStyle = rgba(PAL.text, 0.72);
                    ctx.font = factFont;
                    lines.forEach((l, i) => ctx.fillText(l, anchorX + 23, cy + i * FACT_LINE_H));
                    cy += lines.length * FACT_LINE_H + FACT_GAP;
                });
                ctx.restore();
            }

            function drawLegend() {
                const items = [
                    { c: PAL.cyan, label: 'I/O · ENCODE' },
                    { c: PAL.violet, label: 'NORMALIZE' },
                    { c: PAL.amber, label: 'ATTENTION' },
                    { c: PAL.lime, label: 'FEED-FORWARD' },
                    { c: PAL.rose, label: 'RESIDUAL' },
                ];
                ctx.save();
                ctx.font = "600 7.5px 'JetBrains Mono', monospace";
                ctx.textBaseline = 'middle';
                const dotR = 3,
                    gap = 26;
                const widths = items.map(it => ctx.measureText(it.label).width + dotR * 2 + 7);
                const totalW = widths.reduce((a, b) => a + b, 0) + gap * (items.length - 1);
                let lx = CX - totalW / 2;
                const ly = 1172;
                items.forEach((it, i) => {
                    ctx.beginPath();
                    ctx.arc(lx + dotR, ly, dotR, 0, 2 * Math.PI);
                    ctx.fillStyle = rgba(it.c, 0.85);
                    ctx.fill();
                    ctx.fillStyle = rgba(PAL.muted, 0.85);
                    ctx.textAlign = 'left';
                    ctx.fillText(it.label, lx + dotR * 2 + 7, ly + 0.5);
                    lx += widths[i] + gap;
                });
                ctx.restore();
            }

            function logicalMouseFromEvent(e) {
                const sx = e.clientX,
                    sy = e.clientY;
                const lx = (sx - canvas.width / 2 / dpr) / view.scale + view.focusX;
                const ly = (sy - canvas.height / 2 / dpr) / view.scale + view.focusY;
                return { lx, ly };
            }

            function getHoveredComponent(lx, ly) {
                for (const [key, comp] of Object.entries(comps)) {
                    if (lx >= comp.x && lx <= comp.x + comp.w && ly >= comp.y && ly <= comp.y + comp.h) return key;
                }
                return null;
            }

            function resize() {
                const rect = canvas.parentElement.getBoundingClientRect();
                W = rect.width || window.innerWidth;
                H = rect.height || window.innerHeight;
                dpr = Math.min(window.devicePixelRatio || 1, 2);
                canvas.width = W * dpr;
                canvas.height = H * dpr;
                const newBaseScale = Math.min(W / LW, H / LH);
                if (Math.abs(newBaseScale - baseScale) > 0.0001) {
                    baseScale = newBaseScale;
                    animStartView = { focusX: view.focusX, focusY: view.focusY, scale: view.scale };
                    if (hoveredComp) {
                        const comp = comps[hoveredComp];
                        animTargetView = { focusX: comp.x + comp.w / 2, focusY: comp.y + comp.h / 2, scale: baseScale *
                                1.5 };
                    } else {
                        animTargetView = { focusX: LW / 2, focusY: LH / 2, scale: baseScale };
                    }
                    animProgress = 0;
                }
                if (!hoveredComp && animProgress >= 1) {
                    view.scale = baseScale;
                    view.focusX = LW / 2;
                    view.focusY = LH / 2;
                    animStartView = { focusX: view.focusX, focusY: view.focusY, scale: view.scale };
                    animTargetView = { focusX: view.focusX, focusY: view.focusY, scale: view.scale };
                }
            }

            window.addEventListener('mousemove', (e) => {
                const { lx, ly } = logicalMouseFromEvent(e);
                const newHover = getHoveredComponent(lx, ly);
                if (newHover !== hoveredComp) { hoveredComp = newHover;
                    updateViewTarget(); }
            });
            window.addEventListener('touchmove', (e) => {
                if (e.touches.length > 0) {
                    const { lx, ly } = logicalMouseFromEvent({ clientX: e.touches[0].clientX, clientY: e.touches[
                            0].clientY });
                    const newHover = getHoveredComponent(lx, ly);
                    if (newHover !== hoveredComp) { hoveredComp = newHover;
                        updateViewTarget(); }
                }
            }, { passive: true });
            window.addEventListener('touchend', () => {
                if (hoveredComp) { hoveredComp = null;
                    updateViewTarget(); }
            });
            window.addEventListener('resize', resize);

            let time = 0,
                lastT = 0;

            function animate(ts) {
                if (!lastT) lastT = ts;
                const dt = Math.min((ts - lastT) / 1000, 0.1);
                lastT = ts;
                time += dt;

                if (animProgress < 1) {
                    animProgress = Math.min(1, animProgress + dt / ANIM_DURATION);
                    const t = easeInOutCubic(animProgress);
                    view.focusX = animStartView.focusX + (animTargetView.focusX - animStartView.focusX) * t;
                    view.focusY = animStartView.focusY + (animTargetView.focusY - animStartView.focusY) * t;
                    view.scale = animStartView.scale + (animTargetView.scale - animStartView.scale) * t;
                } else {
                    view.focusX = animTargetView.focusX;
                    view.focusY = animTargetView.focusY;
                    view.scale = animTargetView.scale;
                }

                ctx.setTransform(1, 0, 0, 1, 0, 0);
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
                ctx.clearRect(0, 0, W, H);
                ctx.save();
                ctx.translate(W / 2, H / 2);
                ctx.scale(view.scale, view.scale);
                ctx.translate(-view.focusX, -view.focusY);

                const bgGrad = ctx.createRadialGradient(CX, LH * 0.42, 60, CX, LH * 0.42, LH * 0.78);
                bgGrad.addColorStop(0, '#170617');
                bgGrad.addColorStop(0.55, PAL.bg2);
                bgGrad.addColorStop(1, PAL.bg);
                ctx.fillStyle = bgGrad;
                ctx.fillRect(0, 0, LW, LH);

                ctx.strokeStyle = rgba(PAL.cyan, 0.02);
                ctx.lineWidth = 0.5;
                for (let gx = 0; gx < LW; gx += 60) { ctx.beginPath();
                    ctx.moveTo(gx, 0);
                    ctx.lineTo(gx, LH);
                    ctx.stroke(); }
                for (let gy = 0; gy < LH; gy += 60) { ctx.beginPath();
                    ctx.moveTo(0, gy);
                    ctx.lineTo(LW, gy);
                    ctx.stroke(); }

                bgParts.forEach(p => {
                    p.y -= p.sp;
                    p.x += p.dr + Math.sin(time * 0.6 + p.ph) * 0.25 * ambientScale;
                    if (p.y < -10) p.y = LH + 10;
                    if (p.x < -10) p.x = LW + 10;
                    if (p.x > LW + 10) p.x = -10;
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.r, 0, 2 * Math.PI);
                    ctx.fillStyle = rgba(p.col, 0.2 + 0.15 * Math.sin(time * 2 + p.ph));
                    ctx.fill();
                });

                ctx.save();
                ctx.textBaseline = 'alphabetic';
                ctx.textAlign = 'center';
                ctx.fillStyle = rgba(PAL.muted, 0.65);
                ctx.font = "600 8px 'JetBrains Mono', monospace";
                ctx.fillText('D E C O D E R   L A Y E R   ·   F O R W A R D   P A S S', CX, 30);
                const titleGrad = ctx.createLinearGradient(CX - 170, 0, CX + 170, 0);
                titleGrad.addColorStop(0, PAL.cyan2);
                titleGrad.addColorStop(0.5, PAL.cyan);
                titleGrad.addColorStop(1, PAL.violet);
                ctx.fillStyle = titleGrad;
                ctx.font = "700 27px 'Space Grotesk', 'JetBrains Mono', sans-serif";
                ctx.fillText('TRANSFORMER BLOCK', CX, 62);
                ctx.fillStyle = rgba(PAL.muted, 0.55);
                ctx.font = "500 8px 'JetBrains Mono', monospace";
                ctx.fillText('PRE-NORM · GPT-STYLE · HOVER ANY STAGE TO INSPECT', CX, 84);
                ctx.restore();

                ctx.strokeStyle = rgba(PAL.cyan, 0.2);
                ctx.lineWidth = 1.5;
                ctx.setLineDash([5, 4]);
                [res1, res2].forEach(r => {
                    const midX = Math.min(r.sx, r.ex) - 60,
                        midY = (r.sy + r.ey) / 2;
                    ctx.beginPath();
                    ctx.moveTo(r.sx, r.sy);
                    ctx.quadraticCurveTo(midX, midY, r.ex, r.ey);
                    ctx.stroke();
                });
                ctx.setLineDash([]);

                Object.entries(comps).forEach(([key, comp]) => {
                    const isHover = (key === hoveredComp);
                    drawBox(comp.x, comp.y, comp.w, comp.h, comp.c,
                        comp.type === 'attention' || comp.type === 'ffn' ? 0.12 : 0.06,
                        0.35 + 0.12 * Math.sin(time * 0.7 + comp.x * 0.01), 1.2, isHover, time);
                    drawLabel(comp.x, comp.y, comp.w, comp.h, comp.label, comp.c);
                    drawStepBadge(comp, key, isHover, time);
                });

                for (let i = 0; i < seq.length - 1; i++) {
                    const a = comps[seq[i]],
                        b = comps[seq[i + 1]];
                    arrow(a.x + a.w / 2, a.y + a.h, b.x + b.w / 2, b.y, PAL.cyan, 0.35);
                }

                drawAttention(comps.attn, time);
                drawFFN(comps.ffn, time);

                mainFlows.forEach(p => {
                    p.t += p.speed;
                    if (p.t > 1) { p.t = 0;
                        p.seg = Math.floor(Math.random() * (seq.length - 1)); }
                    const i = Math.min(p.seg, seq.length - 2);
                    const a = comps[seq[i]],
                        b = comps[seq[i + 1]];
                    const fx = a.x + a.w / 2,
                        fy = a.y + a.h,
                        tx = b.x + b.w / 2,
                        ty = b.y;
                    const px = fx + (tx - fx) * p.t,
                        py = fy + (ty - fy) * p.t + Math.sin(time * 4 + p.ph) * 2;
                    const flick = 0.5 + 0.5 * Math.sin(time * 3 + p.ph);
                    ctx.beginPath();
                    ctx.arc(px, py, p.sz * flick, 0, 2 * Math.PI);
                    ctx.fillStyle = rgba(PAL.cyan, 0.7 + flick * 0.3);
                    ctx.shadowColor = PAL.cyan;
                    ctx.shadowBlur = p.sz * 5 * flick;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                });

                [resFlows1, resFlows2].forEach((arr, idx) => {
                    const r = idx === 0 ? res1 : res2;
                    const midX = Math.min(r.sx, r.ex) - 60,
                        midY = (r.sy + r.ey) / 2;
                    arr.forEach(p => {
                        p.t += p.speed;
                        if (p.t > 1) p.t -= 1;
                        const t = p.t;
                        const px = (1 - t) * (1 - t) * r.sx + 2 * (1 - t) * t * midX + t * t * r.ex;
                        const py = (1 - t) * (1 - t) * r.sy + 2 * (1 - t) * t * midY + t * t * r.ey;
                        const flick = 0.5 + 0.5 * Math.sin(time * 5 + p.ph);
                        ctx.beginPath();
                        ctx.arc(px, py, p.sz * flick, 0, 2 * Math.PI);
                        ctx.fillStyle = rgba(PAL.cyan, 0.5 + flick * 0.4);
                        ctx.fill();
                    });
                });

                drawLegend();

                if (hoveredComp) drawPopup(comps[hoveredComp], hoveredComp, time);

                drawAnnotations(time);

                ctx.fillStyle = rgba(PAL.muted, 0.4);
                ctx.font = "400 8px 'JetBrains Mono'";
                ctx.textAlign = 'center';
                ctx.fillText('PRE-NORM · RESIDUAL STREAM · CAUSAL MASK', CX, LH - 30);

                ctx.restore();
                requestAnimationFrame(animate);
            }

            resize();
            view.scale = baseScale;
            view.focusX = LW / 2;
            view.focusY = LH / 2;
            animStartView = { focusX: view.focusX, focusY: view.focusY, scale: view.scale };
            animTargetView = { focusX: view.focusX, focusY: view.focusY, scale: view.scale };
            animProgress = 1;
            requestAnimationFrame(animate);
        })();
    </script>
</body>
</html>
